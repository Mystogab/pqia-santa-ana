<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<title>Parroquia Santa Ana</title>

<link rel="stylesheet" href="styles.css">
<link rel="preload" fetchpriority="high" as="image" href="foto.webp" type="image/webp">
<link rel="prefetch" href="misas.html">
<link rel="prefetch" href="confesiones.html">
<link rel="prefetch" href="secretaria.html">
<meta name="theme-color" content="#800080">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>

<body>

<dialog id="overlay" class="overlay">
  <div class="spinner"></div>
  <p>Cargando...</p>
</dialog>

<header class="header">
  <h1>Parroquia Santa Ana</h1>
</header>

<main class="grid">

  <a class="card" href="misas.html" rel="prefetch">
    🕒 Horarios de Misa
  </a>

  <a class="card" href="confesiones.html" rel="prefetch">
    🙏 Confesiones
  </a>

  <a class="card" href="secretaria.html" rel="prefetch">
    📁 Secretaría Parroquial
  </a>

</main>

<footer class="footer">
  Página realizada por <strong>LevelAPP</strong>
</footer>

<script>
  const cards = document.querySelectorAll('.card');
  const overlay = document.getElementById('overlay');

  cards.forEach(card => {
    card.addEventListener('click', () => {
      overlay.showModal();
      // console.log('foo');
    });
  });

  window.addEventListener('pageshow', (event) => {
  if (event.persisted) {
    overlay.close();
  }
});
</script>

</body>

</html>
